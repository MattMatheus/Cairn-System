trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  GO_VERSION: '1.22.12'
  RELEASE_VERSION: 'azure-$(Build.BuildId)'

steps:
  - task: GoTool@0
    inputs:
      version: '$(GO_VERSION)'

  - script: ./tools/dev/bootstrap_platform.sh
    displayName: Bootstrap platform

  - script: ./products/work-harness/tools/run_doc_tests.sh
    displayName: Run work harness doc tests

  - script: go test ./...
    workingDirectory: $(Build.SourcesDirectory)/products/tool-cli
    displayName: Test tool-cli

  - script: go test ./...
    workingDirectory: $(Build.SourcesDirectory)/products/memory-cli
    displayName: Test memory-cli

  - script: ./tools/dev/build_release_artifacts.sh --version "$(RELEASE_VERSION)" --out-dir "$(Build.ArtifactStagingDirectory)"
    displayName: Build release artifacts

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(RELEASE_VERSION)'
      ArtifactName: 'cairn-release-artifacts'
      publishLocation: 'Container'
